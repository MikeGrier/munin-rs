name: build-extension

# Build per-platform VSIXes for the munin-binlog-mcp VS Code extension on every push
# and PR. This workflow does NOT publish; publishing happens in
# `publish-extension.yml` which is gated behind a required-reviewer
# environment and only fires on `v*` tags.

on:
  push:
    branches: [main]
    paths:
      - "crates/munin-binlog-mcp/**"
      - "crates/munin/**"
      - ".github/workflows/build-extension.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "crates/munin-binlog-mcp/**"
      - "crates/munin/**"
      - ".github/workflows/build-extension.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

permissions:
  contents: read

# Cancel any in-progress run for the same workflow and PR/push when a newer
# commit arrives.  PR number is used on pull_request events (unique per PR,
# fork-safe).  On non-PR events github.run_id is used (unique per run -> no
# cross-run cancellation).  This pairs with the `update-lockfile` job in
# release-please.yml: when that job pushes a fresh Cargo.lock to the Release
# PR branch, the earlier (--locked-failing) run is cancelled automatically.
concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

# Opt every JavaScript-action step into the Node.js 24 runtime ahead of
# GitHub's June 2, 2026 forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  package:
    name: package (${{ matrix.vscode_target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - vscode_target: win32-x64
            rust_target: x86_64-pc-windows-msvc
          - vscode_target: win32-arm64
            rust_target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain (${{ matrix.rust_target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust_target }}

      # `--locked` keeps CI honest: it must build the exact Cargo.lock that
      # was committed, with no implicit lockfile updates. (We avoid
      # `--frozen` because it also disables network access, which would
      # break the initial registry fetch on a cold cache.)
      - name: cargo build --release munin-binlog-mcp
        run: cargo build --release -p munin-binlog-mcp --target ${{ matrix.rust_target }} --locked

      # munin-binlog-mcp tests only need to run on the host architecture (x64); the
      # arm64 binary is cross-compiled and cannot execute on the runner.
      - name: cargo test munin-binlog-mcp (host arch only)
        if: matrix.rust_target == 'x86_64-pc-windows-msvc'
        run: cargo test -p munin-binlog-mcp --target ${{ matrix.rust_target }} --locked

      - name: Read workspace version
        id: workspace-version
        uses: ./.github/actions/workspace-version

      - name: Verify package.json version matches workspace version
        shell: pwsh
        run: |
          $pkg = Get-Content -Raw crates/munin-binlog-mcp/extension/package.json | ConvertFrom-Json
          $pkgVer = $pkg.version
          $wsVer = "${{ steps.workspace-version.outputs.version }}"
          if ($pkgVer -ne $wsVer) {
              Write-Error "package.json version '$pkgVer' does not match workspace version '$wsVer'. Ensure release-please (or a manual edit) has updated package.json in sync with Cargo.toml."
              exit 1
          }
          Write-Host "package.json version OK: $pkgVer"

      - name: Stage binary into extension/bin/
        shell: pwsh
        run: |
          $src = "target/${{ matrix.rust_target }}/release/munin-binlog-mcp.exe"
          $dst = "crates/munin-binlog-mcp/extension/bin/munin-binlog-mcp.exe"
          Copy-Item $src $dst -Force
          $ver = "${{ steps.workspace-version.outputs.version }}"
          Set-Content -NoNewline -Encoding ascii `
              -Path crates/munin-binlog-mcp/extension/bin/VERSION -Value $ver
          "Staged munin-binlog-mcp $ver for ${{ matrix.vscode_target }}"
          Get-ChildItem crates/munin-binlog-mcp/extension/bin

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: npm ci (extension)
        working-directory: crates/munin-binlog-mcp/extension
        # Use `npm ci` rather than `npm install`: package-lock.json is
        # checked in, and `npm ci` is both faster and stricter (it fails
        # if the lockfile and package.json have drifted out of sync).
        run: npm ci --no-audit --no-fund

      - name: Compile TypeScript
        working-directory: crates/munin-binlog-mcp/extension
        run: npm run compile

      - name: vsce package --target ${{ matrix.vscode_target }}
        working-directory: crates/munin-binlog-mcp/extension
        # Use the locally installed @vscode/vsce (locked by package-lock.json)
        # rather than `npx --yes @vscode/vsce@<range>`, which would fetch a
        # potentially different version on each run and undermine build
        # reproducibility.
        run: npx vsce package --target ${{ matrix.vscode_target }} --no-dependencies

      - name: Verify VSIX was produced
        shell: pwsh
        working-directory: crates/munin-binlog-mcp/extension
        run: |
          $vsix = Get-ChildItem -Filter "*.vsix" | Select-Object -First 1
          if (-not $vsix) { throw "No .vsix produced" }
          "Built: $($vsix.Name) ($([math]::Round($vsix.Length / 1KB, 1)) KB)"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: munin-binlog-mcp-${{ matrix.vscode_target }}
          path: crates/munin-binlog-mcp/extension/*.vsix
          if-no-files-found: error
          retention-days: 30
